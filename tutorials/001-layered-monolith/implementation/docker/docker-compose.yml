services:
  db:
    image: postgres:17
    container_name: layered-monolith-db
    environment:
      POSTGRES_DB: layered_monolith
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - layered_monolith_db:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: layered-monolith-api
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=layered_monolith;Username=postgres;Password=postgres
    ports:
      - "8080:8080"

volumes:
  layered_monolith_db:
