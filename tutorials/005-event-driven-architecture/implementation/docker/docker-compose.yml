services:
  postgres:
    image: postgres:16
    container_name: event-driven-postgres
    environment:
      POSTGRES_DB: eventdriven
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventdriven"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: event-driven-rabbitmq
    ports:
      - "5674:5672"
      - "15674:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: event-driven-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=eventdriven;Username=postgres;Password=postgres
      Messaging__Transport: RabbitMq
      Messaging__Host: rabbitmq
      Messaging__Username: guest
      Messaging__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8085:8085"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: event-driven-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=eventdriven;Username=postgres;Password=postgres
      Messaging__Transport: RabbitMq
      Messaging__Host: rabbitmq
      Messaging__Username: guest
      Messaging__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
